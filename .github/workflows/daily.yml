name: Daily Portfolio Intel

on:
  schedule:
    # 01:30 UTC = 07:00 IST
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Fetch intel
        run: python fetch_portfolio_intel.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain portfolio_daily.json)" ]; then
            git add portfolio_daily.json
            git commit -m "daily intel $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes"
          fi
